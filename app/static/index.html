<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panlong Rank</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Panlong Rank</h1>
        <p>上证指数、板块与龙头股排行榜</p>
      </div>
      <div class="status" id="tradeStatus">加载中</div>
    </header>

    <main>
      <section class="index-panel" id="indexPanel"></section>
      <nav class="tabs" id="timeframeTabs" aria-label="时间维度"></nav>

      <section class="chart-band">
        <div class="section-head">
          <h2>板块成交额 Top 10</h2>
          <span id="dataMeta" class="meta">等待数据</span>
        </div>
        <div id="turnoverChart" class="chart"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>板块排行榜</h2>
        </div>
        <div class="rank-grid" id="boardRankings"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>龙头股排行榜</h2>
        </div>
        <div class="rank-grid" id="leaderRankings"></div>
      </section>

      <section class="detail">
        <div class="section-head">
          <h2 id="detailTitle">板块详情</h2>
          <span class="meta" id="detailMeta">点击板块查看</span>
        </div>
        <div class="rank-grid" id="stockRankings"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
